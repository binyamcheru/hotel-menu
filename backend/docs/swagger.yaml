basePath: /api
definitions:
  domain.AddMenuItemIngredientRequest:
    properties:
      ingredient_id:
        type: string
      menu_item_id:
        type: string
    required:
    - ingredient_id
    - menu_item_id
    type: object
  domain.Category:
    properties:
      category_id:
        type: string
      created_at:
        type: string
      hotel_id:
        type: string
      is_active:
        type: boolean
      name_am:
        type: string
      name_en:
        type: string
      updated_at:
        type: string
    type: object
  domain.Chef:
    properties:
      bio_am:
        type: string
      bio_en:
        type: string
      chef_id:
        type: string
      created_at:
        type: string
      hotel_id:
        type: string
      image_url:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  domain.CreateCategoryRequest:
    properties:
      hotel_id:
        type: string
      is_active:
        type: boolean
      name_am:
        type: string
      name_en:
        type: string
    required:
    - hotel_id
    - name_en
    type: object
  domain.CreateChefRequest:
    properties:
      bio_am:
        type: string
      bio_en:
        type: string
      hotel_id:
        type: string
      image_url:
        type: string
      name:
        type: string
    required:
    - hotel_id
    - name
    type: object
  domain.CreateDiscountRequest:
    properties:
      end_date:
        type: string
      hotel_id:
        type: string
      is_active:
        type: boolean
      menu_item_id:
        type: string
      percentage:
        maximum: 100
        type: number
      start_date:
        type: string
    required:
    - end_date
    - hotel_id
    - menu_item_id
    - percentage
    - start_date
    type: object
  domain.CreateFeedbackRequest:
    properties:
      category:
        type: string
      hotel_id:
        type: string
      menu_item_id:
        type: string
      message:
        type: string
    required:
    - hotel_id
    - message
    type: object
  domain.CreateHotelRequest:
    properties:
      address:
        type: string
      language_settings:
        type: string
      logo:
        type: string
      name:
        type: string
      phone:
        type: string
    required:
    - name
    type: object
  domain.CreateIngredientRequest:
    properties:
      hotel_id:
        type: string
      is_allergen:
        type: boolean
      name:
        type: string
    required:
    - hotel_id
    - name
    type: object
  domain.CreateMenuItemRequest:
    properties:
      category_id:
        type: string
      chef_id:
        type: string
      description_am:
        type: string
      description_en:
        type: string
      hotel_id:
        type: string
      image_url:
        type: string
      is_available:
        type: boolean
      is_special:
        type: boolean
      name_am:
        type: string
      name_en:
        type: string
      price:
        type: number
      video_url:
        type: string
    required:
    - category_id
    - hotel_id
    - name_en
    - price
    type: object
  domain.CreateRatingRequest:
    properties:
      comment:
        type: string
      hotel_id:
        type: string
      language:
        type: string
      menu_item_id:
        type: string
      rating:
        maximum: 5
        minimum: 1
        type: integer
    required:
    - hotel_id
    - menu_item_id
    - rating
    type: object
  domain.CreateUserRequest:
    properties:
      email:
        type: string
      hotel_id:
        type: string
      password:
        minLength: 6
        type: string
      phone_no:
        type: string
      role:
        enum:
        - superadmin
        - admin
        type: string
    required:
    - hotel_id
    - password
    - phone_no
    - role
    type: object
  domain.Discount:
    properties:
      created_at:
        type: string
      discount_id:
        type: string
      end_date:
        type: string
      hotel_id:
        type: string
      is_active:
        type: boolean
      menu_item_id:
        type: string
      percentage:
        type: number
      start_date:
        type: string
    type: object
  domain.Feedback:
    properties:
      category:
        type: string
      created_at:
        type: string
      feedback_id:
        type: string
      hotel_id:
        type: string
      menu_item_id:
        type: string
      message:
        type: string
    type: object
  domain.Hotel:
    properties:
      address:
        type: string
      created_at:
        type: string
      hotel_id:
        type: string
      language_settings:
        type: string
      logo:
        type: string
      name:
        type: string
      phone:
        type: string
      updated_at:
        type: string
    type: object
  domain.Ingredient:
    properties:
      created_at:
        type: string
      hotel_id:
        type: string
      ingredient_id:
        type: string
      is_allergen:
        type: boolean
      name:
        type: string
    type: object
  domain.LoginRequest:
    properties:
      password:
        type: string
      phone_no:
        type: string
    required:
    - password
    - phone_no
    type: object
  domain.LoginResponse:
    properties:
      refresh_token:
        type: string
      token:
        type: string
      user:
        $ref: '#/definitions/domain.User'
    type: object
  domain.MenuItem:
    properties:
      category_id:
        type: string
      chef_id:
        type: string
      created_at:
        type: string
      description_am:
        type: string
      description_en:
        type: string
      hotel_id:
        type: string
      image_url:
        type: string
      is_available:
        type: boolean
      is_special:
        type: boolean
      menu_item_id:
        type: string
      name_am:
        type: string
      name_en:
        type: string
      price:
        type: number
      slug:
        type: string
      updated_at:
        type: string
      video_url:
        type: string
      view_count:
        type: integer
    type: object
  domain.Rating:
    properties:
      comment:
        type: string
      created_at:
        type: string
      hotel_id:
        type: string
      language:
        type: string
      menu_item_id:
        type: string
      rating:
        type: integer
      rating_id:
        type: string
    type: object
  domain.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  domain.TokenPair:
    properties:
      refresh_token:
        type: string
      token:
        type: string
    type: object
  domain.UpdateCategoryRequest:
    properties:
      is_active:
        type: boolean
      name_am:
        type: string
      name_en:
        type: string
    type: object
  domain.UpdateChefRequest:
    properties:
      bio_am:
        type: string
      bio_en:
        type: string
      image_url:
        type: string
      name:
        type: string
    type: object
  domain.UpdateDiscountRequest:
    properties:
      end_date:
        type: string
      is_active:
        type: boolean
      percentage:
        type: number
      start_date:
        type: string
    type: object
  domain.UpdateHotelRequest:
    properties:
      address:
        type: string
      language_settings:
        type: string
      logo:
        type: string
      name:
        type: string
      phone:
        type: string
    type: object
  domain.UpdateMenuItemRequest:
    properties:
      category_id:
        type: string
      chef_id:
        type: string
      description_am:
        type: string
      description_en:
        type: string
      image_url:
        type: string
      is_available:
        type: boolean
      is_special:
        type: boolean
      name_am:
        type: string
      name_en:
        type: string
      price:
        type: number
      video_url:
        type: string
    type: object
  domain.UpdateUserRequest:
    properties:
      email:
        type: string
      is_active:
        type: boolean
      password:
        type: string
      phone_no:
        type: string
      role:
        type: string
    type: object
  domain.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      hotel_id:
        type: string
      is_active:
        type: boolean
      phone_no:
        type: string
      role:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  utils.Response:
    properties:
      data: {}
      message:
        type: string
      status:
        type: integer
    type: object
host: localhost:8080
info:
  contact: {}
  description: A comprehensive API for hotel menu management, including hotels, categories,
    menu items, chefs, ratings, discounts, analytics, and feedback.
  title: Hotel Menu API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate a user with phone number and password, returns access
        and refresh tokens
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/domain.LoginResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Login user
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchange a valid refresh token for a new access/refresh token pair
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/domain.TokenPair'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Refresh access token
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register a new admin or superadmin user
      parameters:
      - description: User registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/domain.User'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Register user
      tags:
      - Auth
  /categories:
    post:
      consumes:
      - application/json
      description: Create a new menu category (admin/superadmin only)
      parameters:
      - description: Category data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.CreateCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/domain.Category'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: Create category
      tags:
      - Categories
  /categories/{id}:
    delete:
      description: Delete a category (admin/superadmin only)
      parameters:
      - description: Category ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: Delete category
      tags:
      - Categories
    get:
      description: Get a category's details by its UUID
      parameters:
      - description: Category ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/domain.Category'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: Get category by ID
      tags:
      - Categories
    put:
      consumes:
      - application/json
      description: Update a category's details (admin/superadmin only)
      parameters:
      - description: Category ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Category update data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.UpdateCategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/domain.Category'
