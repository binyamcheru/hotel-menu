services:
  redis:
    image: redis:7-alpine
    container_name: hotelmenu_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  migrate:
    image: migrate/migrate
    container_name: hotelmenu_migrate
    volumes:
      - ./migrations:/migrations
    env_file:
      - .env
    command: [
      "-path", "/migrations",
      "-database", "${DATABASE_URL}",
      "up"
    ]
    restart: on-failure
  
  backend:
    build: .
    container_name: hotelmenu_backend
    env_file:
      - .env 
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: always
  
  seed: 
    build: 
      context: .
    command: ./seed
    env_file: 
      - .env
    restart: "no"

volumes:
  redis_data: