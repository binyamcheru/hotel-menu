services:
  postgres: 
    image: postgres:16-alpine
    container_name: hotelmenu_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hotelmenu_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  migrate:
    image: migrate/migrate
    container_name: hotelmenu_migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command: [
      "-path", "/migrations",
      "-database", "${DATABASE_URL}",
      "up"
    ]
    restart: on-failure
  
  backend:
    build: .
    container_name: hotelmenu_backend
    env_file:
      - .env 
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    # volumes:
    #   - .:/app
          
    ports:
      - "8080:8080"
    restart: always
  
  seed: 
    build: 
      context: .
      # dockerfile: Dockerfile.seed
    # container_name: hotelmenu_seed
    command: ./seed
    env_file: 
      - .env
    depends_on: 
      postgres:
        condition: service_healthy
    restart: "no" # seeds usually run once
    

volumes:
  postgres_data:
  redis_data: